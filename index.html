<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Iuran RT 14 Singa Dangdut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <!-- Import Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .admin-only { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header & Login Status -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-blue-800">Iuran Kolektif Warga</h1>
                <p class="text-gray-600 font-medium">RT 14 Singa Dangdut (Cloud Sync)</p>
            </div>
            <div id="authSection" class="flex items-center gap-2">
                <div id="loginForm" class="flex flex-wrap md:flex-nowrap gap-2 items-center">
                    <input type="text" id="userLogin" placeholder="Username" class="text-xs p-2 border rounded w-24">
                    <div class="relative">
                        <input type="password" id="passLogin" placeholder="Password" class="text-xs p-2 border rounded w-32 pr-8">
                        <button onclick="togglePassword()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.483 8.633 7.07 6.375 12 6.375s8.517 2.258 9.964 5.303a1.012 1.012 0 010 .644C20.517 15.367 16.93 17.625 12 17.625s-8.517-2.258-9.964-5.303z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                    <button onclick="handleLogin()" class="bg-blue-600 text-white text-xs px-4 py-2 rounded hover:bg-blue-700">Login Admin</button>
                </div>
                <div id="adminStatus" class="hidden flex items-center gap-3">
                    <span class="text-sm font-semibold text-green-600">● Admin Aktif (RT14)</span>
                    <button onclick="handleLogout()" class="text-xs text-red-500 underline">Logout</button>
                </div>
            </div>
        </header>

        <!-- Total Pemasukan Card (Semua Akses) -->
        <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card p-4 border-l-4 border-green-500 flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Pemasukan</p>
                    <h3 id="totalBayar" class="text-2xl font-bold text-gray-800">Rp 0</h3>
                </div>
                <div class="bg-green-100 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
            <div class="card p-4 border-l-4 border-red-500 flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Sisa Tagihan</p>
                    <h3 id="totalSisa" class="text-2xl font-bold text-gray-800">Rp 0</h3>
                </div>
                <div class="bg-red-100 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section (Admin Only) -->
            <div class="lg:col-span-1 admin-only" id="formWrapper">
                <div class="card p-6 sticky top-8 border-t-4 border-blue-600">
                    <h2 id="formTitle" class="text-xl font-semibold mb-4 text-gray-800">Input Data Iuran</h2>
                    <form id="iuranForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nama Warga</label>
                            <input type="text" id="nama" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Target Iuran (Rp)</label>
                            <input type="number" id="target" value="100000" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Jumlah Bayar (Rp)</label>
                            <input type="number" id="bayar" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Keterangan</label>
                            <textarea id="keterangan" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" placeholder="Catatan tambahan..."></textarea>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">Simpan Data</button>
                            <button type="button" id="cancelEdit" onclick="resetForm()" class="hidden w-full bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 transition">Batal Edit</button>
                        </div>
                    </form>

                    <!-- Advanced Admin Tools -->
                    <div class="mt-8 pt-6 border-t border-gray-100 space-y-3">
                        <p class="text-xs font-bold text-gray-400 uppercase">Data Tools (Admin)</p>
                        <button onclick="backupData()" class="w-full text-left flex items-center gap-2 text-xs bg-gray-50 p-2 rounded hover:bg-gray-100 text-gray-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                            Backup Data (JSON)
                        </button>
                        <div class="relative">
                            <input type="file" id="restoreFile" onchange="restoreData(event)" class="hidden" accept=".json">
                            <button onclick="document.getElementById('restoreFile').click()" class="w-full text-left flex items-center gap-2 text-xs bg-gray-50 p-2 rounded hover:bg-gray-100 text-gray-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                Restore Data (JSON)
                            </button>
                        </div>
                        <button onclick="clearData()" class="w-full text-left flex items-center gap-2 text-xs bg-red-50 p-2 rounded hover:bg-red-100 text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Reset Semua Data
                        </button>
                    </div>
                </div>
            </div>

            <!-- List Section -->
            <div id="tableWrapper" class="lg:col-span-3">
                <div class="card p-6 overflow-hidden">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-xl font-semibold text-gray-800">Rekapitulasi Pembayaran</h2>
                        <div class="flex flex-wrap gap-2 justify-center">
                            <button onclick="downloadPDF()" class="bg-red-500 text-white text-xs px-3 py-2 rounded hover:bg-red-600 transition">PDF</button>
                            <button onclick="downloadExcel()" class="bg-green-600 text-white text-xs px-3 py-2 rounded hover:bg-green-700 transition">Excel</button>
                            <button onclick="downloadWord()" class="bg-blue-500 text-white text-xs px-3 py-2 rounded hover:bg-blue-600 transition">Word</button>
                        </div>
                    </div>

                    <!-- Kolom Pencarian -->
                    <div class="mb-4 relative">
                        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama warga..." class="w-full p-2 pl-10 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                        <svg class="w-5 h-5 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200" id="data-table">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Warga</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Bayar</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sisa</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase admin-only">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                                <!-- Data rows injected here -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="loadingState" class="text-center py-10 text-gray-500">
                        Memuat data dari database...
                    </div>
                    <div id="emptyState" class="text-center py-10 text-gray-500 hidden">
                        Belum ada data pembayaran.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300">
        Berhasil!
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://rkjcysiyvqcotxhokuvd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJramN5c2l5dnFjb3R4aG9rdXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE0MzcsImV4cCI6MjA5MjcwNzQzN30.H-z6AV142yBvUtiGXT2T2NH10jlqhSdjyH0uGSW3nhc";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dataWarga = [];
        let isAdmin = false;
        let isEditing = false;

        const form = document.getElementById('iuranForm');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const loadingState = document.getElementById('loadingState');
        const notification = document.getElementById('notification');
        const submitBtn = document.getElementById('submitBtn');

        // --- FUNGSI PENCARIAN ---
        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const rows = tableBody.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const nameCol = rows[i].getElementsByTagName('td')[0];
                if (nameCol) {
                    const txtValue = nameCol.textContent || nameCol.innerText;
                    if (txtValue.toLowerCase().indexOf(filter) > -1) {
                        rows[i].style.display = "";
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }
        }

        // --- SISTEM LOGIN & UI ---
        function togglePassword() {
            const passInput = document.getElementById('passLogin');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.483 8.633 7.07 6.375 12 6.375s8.517 2.258 9.964 5.303a1.012 1.012 0 010 .644C20.517 15.367 16.93 17.625 12 17.625s-8.517-2.258-9.964-5.303z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
            }
        }

        function handleLogin() {
            const user = document.getElementById('userLogin').value;
            const pass = document.getElementById('passLogin').value;

            if (user === "RT14" && pass === "Lebulama") {
                isAdmin = true;
                updateUIAccess();
                showNotification("Login Berhasil sebagai Admin");
            } else {
                showNotification("Username atau Password Salah", "bg-red-600");
            }
        }

        function handleLogout() {
            isAdmin = false;
            resetForm();
            document.getElementById('userLogin').value = '';
            document.getElementById('passLogin').value = '';
            updateUIAccess();
            showNotification("Logout Berhasil");
        }

        function updateUIAccess() {
            const adminElements = document.querySelectorAll('.admin-only');
            const loginForm = document.getElementById('loginForm');
            const adminStatus = document.getElementById('adminStatus');
            const tableWrapper = document.getElementById('tableWrapper');

            if (isAdmin) {
                adminElements.forEach(el => el.style.display = 'block');
                loginForm.classList.add('hidden');
                adminStatus.classList.remove('hidden');
                tableWrapper.classList.replace('lg:col-span-3', 'lg:col-span-2');
            } else {
                adminElements.forEach(el => el.style.display = 'none');
                loginForm.classList.remove('hidden');
                adminStatus.classList.add('hidden');
                tableWrapper.classList.replace('lg:col-span-2', 'lg:col-span-3');
            }
            renderTable();
        }

        // Fungsi Ambil Data
        async function fetchWarga() {
            loadingState.classList.remove('hidden');
            const { data, error } = await supabaseClient
                .from('iuran_warga')
                .select('*')
                .order('created_at', { ascending: false });

            loadingState.classList.add('hidden');
            if (error) {
                console.error("Gagal ambil data:", error);
                return;
            }
            dataWarga = data || [];
            updateSummary();
            renderTable();
        }

        function updateSummary() {
            const totalBayar = dataWarga.reduce((sum, item) => sum + (item.bayar || 0), 0);
            const totalSisa = dataWarga.reduce((sum, item) => sum + Math.max(0, (item.target || 0) - (item.bayar || 0)), 0);
            
            document.getElementById('totalBayar').textContent = `Rp ${totalBayar.toLocaleString()}`;
            document.getElementById('totalSisa').textContent = `Rp ${totalSisa.toLocaleString()}`;
        }

        function renderTable() {
            tableBody.innerHTML = '';
            if (dataWarga.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                dataWarga.forEach((item) => {
                    const sisa = item.target - item.bayar;
                    const status = sisa <= 0 ? 'Lunas' : 'Cicil';
                    const statusClass = sisa <= 0 ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';

                    const row = `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-4 whitespace-nowrap">
                                <div class="text-sm font-semibold text-gray-900">${item.nama}</div>
                                <div class="text-xs text-gray-500">${item.keterangan || '-'}</div>
                            </td>
                            <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-700">Rp ${item.bayar.toLocaleString()}</td>
                            <td class="px-4 py-4 whitespace-nowrap text-sm text-red-600 font-medium">Rp ${Math.max(0, sisa).toLocaleString()}</td>
                            <td class="px-4 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">${status}</span>
                            </td>
                            ${isAdmin ? `
                            <td class="px-4 py-4 whitespace-nowrap text-sm font-medium flex gap-3">
                                <button onclick="siapkanEdit('${item.id}')" class="text-blue-600 hover:text-blue-900">Edit</button>
                                <button onclick="hapusData('${item.id}')" class="text-red-600 hover:text-red-900">Hapus</button>
                            </td>` : ''}
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            }
            filterTable();
        }

        function siapkanEdit(id) {
            const item = dataWarga.find(w => w.id == id);
            if (!item) return;

            isEditing = true;
            document.getElementById('editId').value = item.id;
            document.getElementById('nama').value = item.nama;
            document.getElementById('target').value = item.target;
            document.getElementById('bayar').value = item.bayar;
            document.getElementById('keterangan').value = item.keterangan || '';
            
            document.getElementById('formTitle').textContent = "Edit Data Iuran";
            document.getElementById('submitBtn').textContent = "Update Data";
            document.getElementById('cancelEdit').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditing = false;
            form.reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = "Input Data Iuran";
            document.getElementById('submitBtn').textContent = "Simpan Data";
            document.getElementById('cancelEdit').classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isAdmin) return;

            submitBtn.disabled = true;
            submitBtn.textContent = isEditing ? "Mengupdate..." : "Menyimpan...";

            const id = document.getElementById('editId').value;
            const payload = {
                nama: document.getElementById('nama').value,
                target: parseFloat(document.getElementById('target').value),
                bayar: parseFloat(document.getElementById('bayar').value),
                keterangan: document.getElementById('keterangan').value
            };

            let result;
            if (isEditing) {
                result = await supabaseClient
                    .from('iuran_warga')
                    .update(payload)
                    .eq('id', id);
            } else {
                result = await supabaseClient
                    .from('iuran_warga')
                    .insert([payload]);
            }

            submitBtn.disabled = false;

            if (result.error) {
                showNotification("Gagal memproses data", "bg-red-600");
            } else {
                showNotification(isEditing ? "Data berhasil diupdate" : "Data berhasil disimpan");
                resetForm();
                fetchWarga();
            }
        });

        async function hapusData(id) {
            if(!isAdmin) return;
            if(confirm("Hapus data ini dari database permanen?")) {
                const { error } = await supabaseClient
                    .from('iuran_warga')
                    .delete()
                    .eq('id', id);

                if (error) {
                    showNotification("Gagal menghapus data", "bg-red-600");
                } else {
                    showNotification("Data telah dihapus");
                    fetchWarga();
                }
            }
        }

        async function clearData() {
            if(!isAdmin) return;
            if(confirm("Hapus seluruh data iuran di server? Tindakan ini tidak bisa dibatalkan.")) {
                const { error } = await supabaseClient
                    .from('iuran_warga')
                    .delete()
                    .neq('id', '00000000-0000-0000-0000-000000000000'); // Delete all

                if (error) {
                    showNotification("Gagal membersihkan data", "bg-red-600");
                } else {
                    showNotification("Seluruh data dibersihkan");
                    fetchWarga();
                }
            }
        }

        // --- NEW: BACKUP & RESTORE FUNCTIONS ---
        function backupData() {
            if (!isAdmin) return;
            if (dataWarga.length === 0) {
                showNotification("Tidak ada data untuk dibackup", "bg-yellow-600");
                return;
            }
            const dataStr = JSON.stringify(dataWarga, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `Backup_Iuran_RT14_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showNotification("Backup berhasil diunduh");
        }

        async function restoreData(event) {
            if (!isAdmin) return;
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!Array.isArray(importedData)) throw new Error("Format tidak valid");

                    if (confirm(`Apakah Anda yakin ingin memulihkan ${importedData.length} data? Data yang ada di server saat ini TIDAK akan dihapus, data baru akan ditambahkan.`)) {
                        // Bersihkan properti ID dan metadata supabase agar dianggap sebagai baris baru
                        const cleanData = importedData.map(item => ({
                            nama: item.nama,
                            target: item.target,
                            bayar: item.bayar,
                            keterangan: item.keterangan
                        }));

                        const { error } = await supabaseClient
                            .from('iuran_warga')
                            .insert(cleanData);

                        if (error) throw error;

                        showNotification("Restore data berhasil!");
                        fetchWarga();
                    }
                } catch (err) {
                    console.error(err);
                    showNotification("Gagal memproses file backup", "bg-red-600");
                }
                event.target.value = ''; // Reset input file
            };
            reader.readAsText(file);
        }

        function showNotification(msg, color = "bg-green-600") {
            notification.textContent = msg;
            notification.className = `fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 z-50 ${color}`;
            notification.classList.remove('translate-y-20');
            setTimeout(() => {
                notification.classList.add('translate-y-20');
            }, 3000);
        }

        // --- Export Functions ---
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Laporan Iuran RT 14 Singa Dangdut", 14, 15);
            doc.setFontSize(10);
            doc.text(`Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 14, 22);
            const tableData = dataWarga.map(item => [
                item.nama,
                `Rp ${item.bayar.toLocaleString()}`,
                `Rp ${Math.max(0, item.target - item.bayar).toLocaleString()}`,
                (item.target - item.bayar <= 0 ? 'Lunas' : 'Cicil'),
                item.keterangan || '-'
            ]);
            doc.autoTable({ head: [['Nama Warga', 'Bayar', 'Sisa', 'Status', 'Keterangan']], body: tableData, startY: 30 });
            doc.save("Iuran_RT14.pdf");
        }

        function downloadExcel() {
            let csv = "Nama Warga,Jumlah Bayar,Sisa,Status,Keterangan\n";
            dataWarga.forEach(item => {
                const sisa = Math.max(0, item.target - item.bayar);
                const status = sisa <= 0 ? 'Lunas' : 'Cicil';
                csv += `"${item.nama}",${item.bayar},${sisa},${status},"${item.keterangan || '-'}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Data_Iuran_RT14.csv";
            link.click();
        }

        function downloadWord() {
            let content = `<html><body><h1 style="text-align:center">Laporan Iuran RT 14</h1><table border="1" style="width:100%"><thead><tr><th>Nama</th><th>Bayar</th><th>Sisa</th><th>Status</th></tr></thead><tbody>`;
            dataWarga.forEach(item => {
                const sisa = Math.max(0, item.target - item.bayar);
                const status = sisa <= 0 ? 'Lunas' : 'Cicil';
                content += `<tr><td>${item.nama}</td><td>Rp ${item.bayar.toLocaleString()}</td><td>Rp ${sisa.toLocaleString()}</td><td>${status}</td></tr>`;
            });
            content += "</tbody></table></body></html>";
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Laporan_Iuran_RT14.doc";
            link.click();
        }

        fetchWarga();
    </script>
</body>
